name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise install
      - run: mise exec -- go test ./...
      - run: mise exec -- go build ./...
      - run: mise exec -- go run ./tools/gendocs
      - run: git diff --exit-code docs/cli
